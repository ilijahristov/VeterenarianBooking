<div class="main-wrapper">
  <div class="main-wrapper">
  <div class="header-container">
    <app-header></app-header>
  </div>

  <div class="hero-section text-center text-white d-flex align-items-center justify-content-center">
    <div class="hero-content">
      <h1 class="display-4 fw-bold mb-3">Find the Best Care for Your Pet</h1>
      <p class="lead opacity-75">Explore our network of premium veterinary clinics across the globe.</p>
    </div>
  </div>
  
  </div>

  <div class="container py-5">
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let clinic of clinics">
        <div class="clinic-card-modern" (click)="viewClinic(clinic.id)">
          <div class="image-container">
            <img [src]="clinic.image" alt="Clinic">
            <div class="rating-badge">
              <i class="bi bi-star-fill me-1"></i> {{ clinic.rating }}
            </div>
            <div class="overlay-gradient"></div>
          </div>
          
          <div class="card-content p-4">
            <h4 class="clinic-title mb-2">{{ clinic.name }}</h4>
            <div class="d-flex align-items-center text-muted mb-4">
              <i class="bi bi-geo-alt-fill me-2 location-icon"></i>
              <span class="small">{{ clinic.location }}</span>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-auto">
              <span class="status-pill">Available Now</span>
              <div class="view-btn">
                <span>View Details</span>
                <i class="bi bi-arrow-right-short"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
