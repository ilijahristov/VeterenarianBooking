<div class="page">

  <div class="card">

    <div class="card-header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="14" rx="7" ry="10" fill="currentColor"/>
          <ellipse cx="44" cy="14" rx="7" ry="10" fill="currentColor"/>
          <ellipse cx="9"  cy="34" rx="6" ry="9"  fill="currentColor"/>
          <ellipse cx="55" cy="34" rx="6" ry="9"  fill="currentColor"/>
          <path d="M32 28c-12 0-20 8-16 20 2 6 8 10 16 10s14-4 16-10c4-12-4-20-16-20z" fill="currentColor"/>
        </svg>
        <span class="brand-name">VetBooking</span>
      </div>
      <h1 class="card-title">Login to your account</h1>
      <p class="card-description">Enter your email below to login to your account</p>
    </div>

    <div class="card-content">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

        <div class="field-group">

          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input
              class="field-input"
              id="email"
              type="email"
              placeholder="m@example.com"
              [(ngModel)]="email"
              name="email"
              required
            />
          </div>

          <div class="field">
            <div class="field-label-row">
              <label class="field-label" for="password">Password</label>
              <a class="forgot-link">Forgot your password?</a>
            </div>
            <div class="input-wrapper">
              <input
                class="field-input"
                id="password"
                [type]="showPassword() ? 'text' : 'password'"
                placeholder="••••••••"
                [(ngModel)]="password"
                name="password"
                required
              />
              <button type="button" class="eye-btn" (click)="togglePassword()">
                @if (showPassword()) { <i class="bi bi-eye-fill"></i> } @else { <i class="bi bi-eye-slash-fill"></i> }
              </button>
            </div>
          </div>

          <div class="field field-actions">
            @if (error()) {
              <div class="error-banner">
                <span class="error-icon">⚠</span>
                {{ error() }}
              </div>
            }
            <button type="submit" class="btn btn-primary" [disabled]="loading()">
              @if (loading()) { Logging in... } @else { Login }
            </button>
            <p class="signup-text">
              Don't have an account? <a class="signup-link" routerLink="/signup">Sign up</a>
            </p>
          </div>

        </div>
      </form>
    </div>

  </div>
</div>
