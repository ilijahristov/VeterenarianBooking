<div [class.fade-out]="isExiting" class="page-container container mt-4" id="happy-pets-page">
    <app-header></app-header>
  <div class="row g-2 gallery-container">
    <div class="col-md-6 main-img">
      <div class="img-wrapper h-100">
        <img src="assets/hp2.png" alt="Main" class="img-fluid rounded-start">
      </div>
    </div>
    <div class="col-md-6">
      <div class="row g-2 h-100">
        <div class="col-6">
          <img src="assets/hp3.png" class="img-fluid rounded shadow-sm" alt="Clinic">
        </div>
        <div class="col-6">
          <img src="assets/hp1.png" class="img-fluid rounded shadow-sm" alt="Clinic">
        </div>
        <div class="col-6">
          <img src="assets/hp5.png" class="img-fluid rounded shadow-sm" alt="Clinic">
        </div>
        <div class="col-6">
          <img src="assets/hp4.png" class="img-fluid rounded shadow-sm" alt="Clinic">
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col-lg-8">
      <div class="d-flex align-items-center mb-2">
        <h1 class="fw-bold me-2">{{ clinic.name }}</h1>
        <i class="bi bi-patch-check-fill text-primary"></i>
      </div>
      
      <div class="d-flex align-items-center mb-3">
        <span class="text-warning me-2"><i class="bi bi-star-fill"></i> 4.4</span>
        <span class="text-muted">(200 reviews)</span>
      </div>

      <p class="status-text mb-4">
        <span class="dot bg-success"></span> Open now • Closes at 21:00
      </p>

      <p class="text-secondary mb-5" style="line-height: 1.7; font-size: 1.1rem;">
        {{ clinic.description }}
      </p>

      <h3 class="fw-bold mb-4">Our Services</h3>
      <div class="row g-3">
        <div class="col-md-3" *ngFor="let service of clinic.services">
          <div class="service-card text-center p-4 border rounded shadow-sm h-100">
            <i [class]="service.icon + ' fs-2 text-primary mb-3'"></i>
            <p class="mb-0 fw-semibold">{{ service.title }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 20px;">
        <h4 class="fw-bold mb-4">Clinic Information</h4>
        <div class="d-flex mb-3">
          <i class="bi bi-geo-alt me-3 text-primary"></i>
          <span>{{ clinic.address }}</span>
        </div>
        <div class="d-flex mb-3">
          <i class="bi bi-telephone me-3 text-primary"></i>
          <span>{{ clinic.phone }}</span>
        </div>
        <div class="d-flex mb-4">
          <i class="bi bi-envelope me-3 text-primary"></i>
          <span>{{ clinic.email }}</span>
        </div>
        
        <button class="btn btn-primary btn-lg w-100 py-3 rounded-3 fw-bold shadow" (click)="onBook()">
          Book an Appointment
        </button>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
