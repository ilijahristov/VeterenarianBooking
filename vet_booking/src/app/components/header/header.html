<header class="header">
  <div class="header-inner">
    <div class="brand-container">
      <svg class="brand-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="14" rx="7" ry="10" fill="currentColor"/>
          <ellipse cx="44" cy="14" rx="7" ry="10" fill="currentColor"/>
          <ellipse cx="9"  cy="34" rx="6" ry="9"  fill="currentColor"/>
          <ellipse cx="55" cy="34" rx="6" ry="9"  fill="currentColor"/>
          <path d="M32 28c-12 0-20 8-16 20 2 6 8 10 16 10s14-4 16-10c4-12-4-20-16-20z" fill="currentColor"/>
      </svg>
      <a class="brand" routerLink="">
        <span class="brand-name">VetBooking</span>
      </a>
      <button
        type="button"
        class="accordion-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen"
        aria-controls="header-accordion-panel"
        aria-label="Toggle menu"
      >
        <span class="toggle-line"></span>
        <span class="toggle-line"></span>
        <span class="toggle-line"></span>
      </button>
    </div>

    <div id="header-accordion-panel" class="accordion-panel" [class.open]="isMobileMenuOpen">
      <nav class="nav">
        <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Home</a>
        <a class="nav-link" routerLink="/book-appointment" routerLinkActive="active" (click)="closeMobileMenu()">Book Appointment</a>
        <a class="nav-link" routerLink="/my-bookings" routerLinkActive="active" (click)="closeMobileMenu()">View Appointments</a>
      </nav>

      <div class="actions">
        <button class="btn-signout" (click)="onSignOut()">Sign Out</button>
      </div>
    </div>
  </div>
</header>
