<header class="header">
  <div class="header-inner">

    <a class="brand" routerLink="/">
      <span class="brand-name">VetBooking</span>
    </a>

    <nav class="nav">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a class="nav-link" routerLink="/book" routerLinkActive="active">Book Appointment</a>
      <a class="nav-link" routerLink="/bookings" routerLinkActive="active">View Appointments</a>
    </nav>

    <div class="actions">
      <button class="btn-signout" (click)="onSignOut()">Sign Out</button>
      <div class="avatar">
        @if (profileImageSrc) {
          <img [src]="profileImageSrc" alt="Profile" class="avatar-img" />
        } @else {
          <span class="avatar-initials">{{ profileInitials }}</span>
        }
      </div>
    </div>

  </div>
</header>
