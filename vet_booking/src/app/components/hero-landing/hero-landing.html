<section class="hero">
  <div class="hero-bg" [style.background-image]="'url(' + heroBg + ')'"></div>
  <div class="hero-overlay">
    <div class="hero-content">
      <app-header />
      <div class="hero-content-inner">
        <h1 class="hero-title">Book an Appointment</h1>
        <p>Book an appointment with your favorite vet, or head down to view</p>
        <button class="hero-btn">Book Now</button>
      </div>
    </div>
  </div>
</section>
