<section class="news-landing">
  <h2 class="news-title">Latest News & Offers</h2>
  <div class="news-grid">
    @for (card of visibleCards(); track card.title) {
      <app-card
        [thumbnail]="card.thumbnail"
        [date]="card.date"
        [author]="card.author"
        [title]="card.title"
        [summary]="card.summary"
      />
    }
  </div>
  <div class="news-dots">
    @for (dot of [].constructor(totalSlides()); track $index) {
      <button
        class="dot"
        [class.active]="$index === currentIndex()"
        (click)="goTo($index)"
      ></button>
    }
  </div>
</section>
