<section class="contact-cta">
  <div class="contact-cta-bg" [style.background-image]="'url(' + heroBg + ')'"></div>
  <div class="contact-cta-overlay">
    <div class="contact-cta-inner">
      <p class="contact-cta-text">
        If you're a vet clinic, you can contact us by filling out our form or calling us with the number below, to get started!
      </p>
      <button class="contact-cta-btn" routerLink="/contact">Contact Us</button>
    </div>
  </div>
</section>
